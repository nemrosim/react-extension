<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
        }

        .download-form {
            margin-bottom: 30px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .downloads-list {
            margin-top: 30px;
        }

        .download-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
        }

        .download-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .download-url {
            font-size: 14px;
            color: #666;
            word-break: break-all;
            margin-bottom: 5px;
        }

        .download-id {
            font-size: 12px;
            color: #999;
            font-family: monospace;
        }

        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-starting {
            background: #fff3cd;
            color: #856404;
        }

        .status-downloading {
            background: #cfe2ff;
            color: #084298;
        }

        .status-completed {
            background: #d1e7dd;
            color: #0f5132;
        }

        .status-failed {
            background: #f8d7da;
            color: #842029;
        }

        .progress-bar-container {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 15px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .error-message {
            color: #dc3545;
            margin-top: 10px;
            padding: 10px;
            background: #f8d7da;
            border-radius: 5px;
            font-size: 14px;
        }

        .no-downloads {
            text-align: center;
            color: #999;
            padding: 40px;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎥 Video Downloader</h1>

        <div class="download-form">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Enter video URL..." />
                <button onclick="startDownload()">Download</button>
            </div>
        </div>

        <div class="downloads-list" id="downloadsList">
            <div class="no-downloads">No downloads yet. Enter a URL to get started!</div>
        </div>
    </div>

    <script>
        const downloads = new Map();

        // Check for ?id URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const autoId = urlParams.get('id');

        if (autoId) {
            // Hide the form if we are directly tracking an ID
            document.querySelector('.download-form').style.display = 'none';
            downloads.set(autoId, {
                id: autoId,
                url: 'Loading...',
                status: 'starting',
                progress: 0
            });
            renderDownloads();
            startPolling(autoId);
        }

        async function startDownload() {
            const urlInput = document.getElementById('urlInput');
            const url = urlInput.value.trim();

            if (!url) {
                alert('Please enter a URL');
                return;
            }

            try {
                const response = await fetch('http://localhost:3000/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                if (!response.ok) {
                    throw new Error('Failed to start download');
                }

                const data = await response.json();
                const downloadId = data.downloadId;

                downloads.set(downloadId, {
                    id: downloadId,
                    url: url,
                    status: 'starting',
                    progress: 0
                });

                urlInput.value = '';
                renderDownloads();
                startPolling(downloadId);

            } catch (error) {
                alert('Error starting download: ' + error.message);
            }
        }

        function startPolling(downloadId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`http://localhost:3000/download/${downloadId}`);

                    if (!response.ok) {
                        if (response.status === 404 && autoId) {
                            document.getElementById('downloadsList').innerHTML = '<div class="error-message">Download tracking ID not found on server.</div>';
                        }
                        clearInterval(interval);
                        return;
                    }

                    const data = await response.json();
                    downloads.set(downloadId, data);
                    renderDownloads();

                    if (data.status === 'completed' || data.status === 'failed') {
                        clearInterval(interval);
                    }

                } catch (error) {
                    console.error('Polling error:', error);
                    // Don't clear interval on network error, server might be restarting
                }
            }, 1000); // Polling every 1 second
        }

        function renderDownloads() {
            const container = document.getElementById('downloadsList');

            if (downloads.size === 0) {
                container.innerHTML = '<div class="no-downloads">No downloads yet. Enter a URL to get started!</div>';
                return;
            }

            const items = Array.from(downloads.values()).reverse();

            container.innerHTML = items.map(download => `
                <div class="download-item">
                    <div class="download-header">
                        <div>
                            <div class="download-url">${escapeHtml(download.url)}</div>
                            <div class="download-id">ID: ${download.downloadId || download.id}</div>
                        </div>
                        <span class="status-badge status-${download.status}">${download.status}</span>
                    </div>

                    <div class="progress-bar-container">
                        <div class="progress-bar" style="width: ${download.progress}%"></div>
                        <div class="progress-text">${typeof download.progress === 'number' ? download.progress.toFixed(1) : 0}%</div>
                    </div>

                    ${download.status === 'downloading' ? `
                      <div style="margin-top: 10px; font-size: 13px; color: #555; display: flex; justify-content: space-between; align-items: center; background: #f0f0f0; padding: 10px; border-radius: 5px;">
                          <div>
                              <strong>Speed:</strong> <span style="font-family: monospace;">${download.speed || 'Calculating...'}</span>
                          </div>
                          <div>
                              <strong>ETA:</strong> <span style="font-family: monospace;">${download.eta || 'Calculating...'}</span>
                          </div>
                          ${download.fragTotal ? `
                          <div>
                              <strong>Fragments:</strong> <span style="font-family: monospace;">${download.fragDownloaded} / ${download.fragTotal}</span>
                          </div>
                          ` : ''}
                      </div>
                    ` : ''}

                    ${download.error ? `<div class="error-message">${escapeHtml(download.error)}</div>` : ''}

                    ${download.status === 'completed' && download.files && download.files.length > 0 ? `
                        <div style="margin-top: 20px;">
                            <strong>Ready to Download:</strong>
                            <div style="display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap;">
                                ${download.files.map(file => `
                                    <a href="${file}" download class="download-button" style="text-decoration: none; padding: 10px 15px; background: #28a745; color: white; border-radius: 5px; font-weight: bold; font-size: 14px; transition: 0.2s;">
                                        ⬇️ Download ${file.substring(file.lastIndexOf('/') + 1)}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Allow Enter key to submit
        const urlInput = document.getElementById('urlInput');
        if (urlInput) {
            urlInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    startDownload();
                }
            });
        }
    </script>
</body>

</html>
